# =============================================================================
# Combined Code Coverage (union of all test pipelines)
# =============================================================================
# Purpose:
#   The unit + per-database (MsSql, PostgreSql, MySql, DwSql, CosmosDb) pipelines
#   each publish their OWN coverage tab. No single view shows the union, so each
#   pipeline looks low (~30-43% branch) even though the merged coverage is ~77%.
#
#   This aggregator runs AFTER the six test pipelines complete, downloads the
#   coverage each already publishes, merges them (scripts/merge-coverage.ps1),
#   and republishes ONE combined report. THIS pipeline's build is where the true
#   combined "Code Coverage" tab lives.
#
#   NOTE: This REUSES the existing "Code Coverage Report_<buildId>" artifact that
#   every pipeline's PublishCodeCoverageResults@1 step already produces (the same
#   zip downloadable from each build). No changes to the six pipelines required.
#   The `patterns` filter grabs only the small cobertura xml and skips the ~22MB
#   bundled HTML report, and avoids needing the dynamic artifact name.
#
# BEFORE ENABLING (one-time, manual — this yaml does NOTHING until registered):
#   1. Confirm each pipeline resource `source:` matches that pipeline's name in
#      the Azure DevOps Pipelines list. The definition name is NOT stored in the
#      repo, so the values below are best-guess and may need adjusting.
#   2. Create the pipeline in Azure DevOps: Pipelines > New pipeline > "Existing
#      Azure Pipelines YAML file" > point at this file. Name it "Total Code
#      Coverage" (that name becomes the GitHub status check and the Pipelines-
#      list entry; its build's Code Coverage tab shows the combined number).
#      NOTE: merging this file alone does not create or run anything.
#   3. Run the new pipeline once manually. Azure DevOps only arms
#      `resources.pipelines` completion triggers AFTER the pipeline has run once,
#      so the "run after the six test pipelines" trigger won't fire until then.
#   4. Fallback only if `- download` cannot see the report (it is a build/
#      container artifact): add a deterministic pipeline artifact to each
#      *-pipelines.yml --
#          - task: PublishPipelineArtifact@1
#            inputs:
#              targetPath: '$(Agent.TempDirectory)'
#              artifact: 'coverage-<db>'
#      -- and change the downloads below to `- download: <alias>`.
# =============================================================================

# Build-number format for each run (the human-facing pipeline name is set in
# Azure DevOps as "Total Code Coverage").
name: 'TotalCodeCoverage_$(Date:yyyyMMdd)$(Rev:.r)'

trigger: none      # runs via pipeline-completion resource triggers, not on push

resources:
  pipelines:
    # `source` must match each pipeline's name in the Azure DevOps Pipelines list.
    # These are best-guess names derived from the existing *-pipelines.yml; adjust
    # if the ADO definition names differ.
    - pipeline: unit
      source: 'DataApiBuilder-UnitTests'
      trigger: true
    - pipeline: mssql
      source: 'DataApiBuilder-MsSql'
      trigger: true
    - pipeline: pg
      source: 'DataApiBuilder-PostgreSql'
      trigger: true
    - pipeline: mysql
      source: 'DataApiBuilder-MySql'
      trigger: true
    - pipeline: dwsql
      source: 'DataApiBuilder-DwSql'
      trigger: true
    - pipeline: cosmos
      source: 'DataApiBuilder-CosmosDb'
      trigger: true

pool:
  vmImage: 'windows-latest'

steps:
  # Reuse the coverage each pipeline already publishes; `patterns` keeps only the
  # cobertura xml (skips the bundled HTML) and avoids needing the dynamic
  # "Code Coverage Report_<buildId>" artifact name.
  - download: unit
    patterns: '**/*.cobertura.xml'
  - download: mssql
    patterns: '**/*.cobertura.xml'
  - download: pg
    patterns: '**/*.cobertura.xml'
  - download: mysql
    patterns: '**/*.cobertura.xml'
  - download: dwsql
    patterns: '**/*.cobertura.xml'
  - download: cosmos
    patterns: '**/*.cobertura.xml'

  - task: PowerShell@2
    displayName: 'Merge cobertura reports (union) and print combined %'
    inputs:
      filePath: 'scripts/merge-coverage.ps1'
      arguments: '-Path "$(Pipeline.Workspace)"'
      pwsh: false

  # Also emit a merged cobertura via ReportGenerator so the combined number shows
  # in the Code Coverage tab (excludes test projects so it reflects product code).
  - task: reportgenerator@5
    displayName: 'Generate merged cobertura'
    inputs:
      reports: '$(Pipeline.Workspace)/**/*.cobertura.xml'
      targetdir: '$(Build.ArtifactStagingDirectory)/merged'
      reporttypes: 'Cobertura;HtmlInline_AzurePipelines;TextSummary'
      assemblyfilters: '-*.Tests'

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish combined code coverage'
    inputs:
      summaryFileLocation: '$(Build.ArtifactStagingDirectory)/merged/Cobertura.xml'
