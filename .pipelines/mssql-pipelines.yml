# MsSql Integration Testing Pipeline config is split into parallel jobs:
# 1) linux (disabled) -> Run SQL Server 2019 in Linux Docker Image
# 2) windows_graphql -> GraphQL integration tests on LocalDB
# 3) windows_rest -> REST API tests on LocalDB
# 4) windows_config_and_integration -> Config, Auth, OpenApi, Telemetry tests on LocalDB
# 5) windows_unittests -> MsSql unit tests on LocalDB (starts after GraphQL)
# 6) windows_hotreload -> Hot-Reload tests on LocalDB (starts after GraphQL)

trigger:
  batch: true
  branches:
    include:
    - main
    - gh-readonly-queue/main
    - release/*
  paths:
    exclude:
    - docs

pr:
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - samples/**
    - docs/**
    - '*.md'
    - templates/**

jobs:
- job: linux
  condition: false # Disable until we resolve flakey pipeline issue. https://github.com/Azure/data-api-builder/issues/2010
  pool:
    vmImage: 'ubuntu-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      dbPassword: ''
      data-source.connection-string: ''

  steps:
  - task: NuGetAuthenticate@1
    displayName: 'NuGet Authenticate'
  
  # The .NET CLI commands in proceeding tasks use the .NET SDK version specified ("selected") here.
  # Per Microsoft Learn Docs, "Selecting the .NET SDK version is independent from 
  # specifying the runtime version a project targets."
  - task: UseDotNet@2
    displayName: Setup .NET SDK v8.0.x
    inputs:
      packageType: sdk
      version: 8.0.x

  - task: NuGetToolInstaller@1

  - task: DotNetCoreCLI@2
    displayName: Restore NuGet packages
    inputs:
      command: restore
      projects: '$(solution)'
      feedsToUse: config
      nugetConfigPath: Nuget.config
      restoreArguments: '/p:RuntimeIdentifiers=""'

  - task: Bash@3
    displayName: 'Generate password'
    inputs:
      targetType: 'inline'
      script: |
        password=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c24)
        echo "##vso[task.setvariable variable=dbPassword;]$password"
  
  - task: PowerShell@2
    displayName: 'Set Connection String'
    inputs:
      targetType: 'inline'
      script: |
        $connectionString="Server=tcp:127.0.0.1,1433;Persist Security Info=False;User ID=SA;Password=$(dbPassword);MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;Encrypt=False;"
        Write-Host "##vso[task.setvariable variable=data-source.connection-string]$connectionString"

  - task: Bash@3
    condition: eq( variables['Agent.OS'], 'Linux' )
    displayName: Get and Start Ubuntu SQL Server Image Docker with SSL enabled
    inputs:
      targetType: 'inline'
      script: |
        echo "Executing script with arguments."
        chmod +x ./scripts/start-mssql-server.bash
        ./scripts/start-mssql-server.bash $(dbPassword)

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: |
        **/*.csproj
        !**/*Tests*.csproj
      arguments: '-p:generateConfigFileForDbType=mssql --configuration $(buildConfiguration)' # Update this to match your need

  - task: DotNetCoreCLI@2
    displayName: Build Test Projects
    inputs:
      command: build
      projects: '**/*Tests/*.csproj'
      arguments: '--configuration $(buildConfiguration)'

  - task: FileTransform@1.206.0
    displayName: 'Generate dab-config.MsSql.json'
    inputs:
      folderPath: '$(System.DefaultWorkingDirectory)'
      fileType: 'json'
      targetFiles: 'src/out/tests/*/dab-config.MsSql.json'

  - task: DotNetCoreCLI@2
    displayName: 'Run MsSql Integration Tests'
    inputs:
      command: test
      arguments: '--filter "TestCategory=MsSql&FullyQualifiedName!~ConfigurationHotReloadTests" --no-build --configuration $(buildConfiguration) --collect "XPlat Code coverage"'
      projects: '**/*Tests/*.csproj'

  - task: CmdLine@2
    displayName: 'Set flag to publish Verify *.received files when tests fail'
    condition: failed()
    inputs:
      script: 'echo ##vso[task.setvariable variable=publishverify]Yes'

  - task: CopyFiles@2
    condition: eq(variables['publishverify'], 'Yes')
    displayName: 'Copy received files to Artifact Staging'
    inputs:
      contents: '**\*.received.*' 
      targetFolder: '$(Build.ArtifactStagingDirectory)\Verify'
      cleanTargetFolder: true
      overWrite: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish received files as Artifacts'
    name: 'verifypublish'
    condition: eq(variables['publishverify'], 'Yes')
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)\Verify'
      ArtifactName: 'Verify'
      publishLocation: 'Container'

  - task: PublishCodeCoverageResults@1
    displayName: 'Publish code coverage'
    inputs:
      codeCoverageTool: Cobertura
      summaryFileLocation: '$(Agent.TempDirectory)/**/*cobertura.xml'


# MsSql Integration Testing is split into five jobs across two phases:
# Phase 1 (immediate, 3 agents): GraphQL, REST, Config & Integration
# Phase 2 (after GraphQL, 2 agents): Unit Tests, Hot-Reload
#
# This staggering keeps peak agent usage at 3-4 instead of 5, reducing
# contention with the org-wide Microsoft-Hosted parallelism limit (10),
# while maintaining the same ~30 min wall-clock time.
#
# 1) windows_graphql -> GraphQL integration tests (SqlTests.GraphQL*)
# 2) windows_rest -> REST API tests (SqlTests.Rest*)
# 3) windows_config_and_integration -> Configuration, Authorization, OpenApi, Telemetry tests
# 4) windows_unittests -> MsSql unit tests (dependsOn: graphql)
# 5) windows_hotreload -> ConfigurationHotReloadTests (dependsOn: graphql)

- job: windows_graphql
  displayName: 'Windows - GraphQL Integration Tests'
  pool:
    vmImage: 'windows-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      # Need to override the connection string set on the pipeline UI
      # since windows needs a different string.
      # The variable setting on the pipeline UI sets the connection string
      # for the linux job above.
      data-source.connection-string: Server=(localdb)\MSSQLLocalDB;Persist Security Info=False;Integrated Security=True;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;
      InstallerUrl: https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi
      SqlVersionCode: '15.0'

  steps:
  - template: templates/mssql-test-steps.yml
    parameters:
      testFilter: 'TestCategory=MsSql&FullyQualifiedName~SqlTests.GraphQL'
      testDisplayName: 'MsSql GraphQL Integration Tests'
      artifactSuffix: '-GraphQL'

- job: windows_rest
  displayName: 'Windows - REST Integration Tests'
  pool:
    vmImage: 'windows-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      # Need to override the connection string set on the pipeline UI
      # since windows needs a different string.
      # The variable setting on the pipeline UI sets the connection string
      # for the linux job above.
      data-source.connection-string: Server=(localdb)\MSSQLLocalDB;Persist Security Info=False;Integrated Security=True;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;
      InstallerUrl: https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi
      SqlVersionCode: '15.0'

  steps:
  - template: templates/mssql-test-steps.yml
    parameters:
      testFilter: 'TestCategory=MsSql&FullyQualifiedName~SqlTests.Rest'
      testDisplayName: 'MsSql REST Integration Tests'
      artifactSuffix: '-REST'

- job: windows_config_and_integration
  displayName: 'Windows - Config & Integration Tests'
  pool:
    vmImage: 'windows-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      # Need to override the connection string set on the pipeline UI
      # since windows needs a different string.
      # The variable setting on the pipeline UI sets the connection string
      # for the linux job above.
      data-source.connection-string: Server=(localdb)\MSSQLLocalDB;Persist Security Info=False;Integrated Security=True;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;
      InstallerUrl: https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi
      SqlVersionCode: '15.0'

  steps:
  - template: templates/mssql-test-steps.yml
    parameters:
      testFilter: 'TestCategory=MsSql&FullyQualifiedName!~SqlTests.GraphQL&FullyQualifiedName!~SqlTests.Rest&FullyQualifiedName!~ConfigurationHotReloadTests&FullyQualifiedName!~UnitTests'
      testDisplayName: 'MsSql Config & Integration Tests'
      artifactSuffix: '-ConfigAndIntegration'
      initDbSchema: true

- job: windows_unittests
  displayName: 'Windows - MsSql Unit Tests'
  dependsOn: windows_graphql
  pool:
    vmImage: 'windows-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      # Need to override the connection string set on the pipeline UI
      # since windows needs a different string.
      # The variable setting on the pipeline UI sets the connection string
      # for the linux job above.
      data-source.connection-string: Server=(localdb)\MSSQLLocalDB;Persist Security Info=False;Integrated Security=True;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;
      InstallerUrl: https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi
      SqlVersionCode: '15.0'

  steps:
  - template: templates/mssql-test-steps.yml
    parameters:
      testFilter: 'TestCategory=MsSql&FullyQualifiedName~UnitTests'
      testDisplayName: 'MsSql Unit Tests'
      artifactSuffix: '-UnitTests'
      initDbSchema: true

- job: windows_hotreload
  displayName: 'Windows - Hot-Reload Tests'
  dependsOn: windows_graphql
  pool:
    vmImage: 'windows-latest'
  variables:
      solution: '**/*.sln'
      buildPlatform: 'Any CPU'
      buildConfiguration: 'Release'
      # Need to override the connection string set on the pipeline UI
      # since windows needs a different string.
      # The variable setting on the pipeline UI sets the connection string
      # for the linux job above.
      data-source.connection-string: Server=(localdb)\MSSQLLocalDB;Persist Security Info=False;Integrated Security=True;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=True;
      InstallerUrl: https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi
      SqlVersionCode: '15.0'

  steps:
  - template: templates/mssql-test-steps.yml
    parameters:
      testFilter: 'TestCategory=MsSql&FullyQualifiedName~ConfigurationHotReloadTests'
      testDisplayName: 'MsSql Hot-Reload Tests'
      testTimeout: 45
      additionalTestArgs: '--logger "console;verbosity=detailed"'
      artifactSuffix: '-HotReload'
      initDbSchema: true
